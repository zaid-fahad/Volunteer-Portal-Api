version: '3.8'

services:
  web:
    build: .
    container_name: vmapp_backend
    command: gunicorn VMApp.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-docker-dev
      - DATABASE_URL=sqlite:///db.sqlite3
      - CORS_ALLOW_ALL_ORIGINS=True
